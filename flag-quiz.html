<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLAG QUIZ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --card: #fffdf8;
    --ink: #1a1208;
    --muted: #9a8f7a;
    --accent: #e8401c;
    --accent2: #1a6bd4;
    --correct: #1a9e4a;
    --wrong: #e8401c;
    --border: #ddd5c3;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    padding: 1.5rem;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(var(--border) 1px, transparent 1px);
    background-size: 28px 28px;
    opacity: 0.5;
    pointer-events: none;
  }

  .card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem 2.5rem 2rem;
    width: 100%;
    max-width: 500px;
    box-shadow: 6px 6px 0 var(--border);
    position: relative;
    z-index: 1;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
  }

  .logo {
    font-size: 0.75rem;
    font-weight: 800;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .progress-wrap {
    display: flex;
    gap: 6px;
  }

  .pip {
    width: 28px;
    height: 6px;
    border-radius: 99px;
    background: var(--border);
    transition: background 0.3s;
  }
  .pip.done { background: var(--accent); }
  .pip.active { background: var(--ink); }

  .flag-wrap {
    width: 100%;
    aspect-ratio: 3/2;
    border-radius: 12px;
    overflow: hidden;
    border: 1.5px solid var(--border);
    margin-bottom: 1.8rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9rem;
    line-height: 1;
    background: #f9f5ee;
    user-select: none;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.04);
    transition: transform 0.2s;
  }

  .question-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .question-text {
    font-size: 1.35rem;
    font-weight: 800;
    color: var(--ink);
    margin-bottom: 1.4rem;
    line-height: 1.2;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
  }

  .opt {
    display: flex;
    align-items: center;
    gap: 1rem;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 0.85rem 1.1rem;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    background: var(--card);
  }

  .opt:hover:not(.disabled) {
    border-color: var(--ink);
    transform: translateX(3px);
  }

  .opt-key {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--muted);
    width: 22px;
    text-align: center;
    flex-shrink: 0;
  }

  .opt-text {
    font-size: 1rem;
    font-weight: 700;
    color: var(--ink);
  }

  .opt.correct {
    border-color: var(--correct);
    background: #edfbf2;
  }
  .opt.correct .opt-key { color: var(--correct); }
  .opt.wrong {
    border-color: var(--wrong);
    background: #fdf0ee;
  }
  .opt.wrong .opt-key { color: var(--wrong); }
  .opt.disabled { cursor: default; }

  .feedback {
    margin-top: 1.2rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    min-height: 1.2em;
    color: var(--muted);
    transition: opacity 0.2s;
  }

  .feedback.show-correct { color: var(--correct); }
  .feedback.show-wrong { color: var(--wrong); }

  .next-btn {
    margin-top: 1.4rem;
    width: 100%;
    padding: 0.9rem;
    background: var(--ink);
    color: var(--bg);
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    display: none;
  }
  .next-btn:hover { opacity: 0.85; transform: translateY(-1px); }

  /* Results */
  .results {
    text-align: center;
    display: none;
  }

  .score-big {
    font-size: 5rem;
    font-weight: 800;
    color: var(--ink);
    line-height: 1;
    margin: 1rem 0 0.3rem;
  }

  .score-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  .result-msg {
    font-size: 1.3rem;
    font-weight: 800;
    color: var(--ink);
    margin-bottom: 0.5rem;
  }

  .result-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 2rem;
    line-height: 1.6;
  }

  .restart-btn {
    padding: 0.9rem 2.5rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    transition: opacity 0.15s;
    letter-spacing: 0.06em;
  }
  .restart-btn:hover { opacity: 0.85; }

  .stars {
    font-size: 2.2rem;
    margin-bottom: 0.5rem;
    letter-spacing: 0.1em;
  }

  @keyframes pop {
    0% { transform: scale(0.92); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .pop { animation: pop 0.25s ease-out; }
</style>
</head>
<body>
<div class="card" id="card">

  <div id="quiz-view">
    <div class="top-bar">
      <div class="logo">Flag Quiz</div>
      <div class="progress-wrap" id="pips"></div>
    </div>

    <div class="flag-wrap" id="flag">🏳️</div>

    <div class="question-label">Question <span id="q-num">1</span> of 5</div>
    <div class="question-text">Which country does this flag belong to?</div>

    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn">Next →</button>
  </div>

  <div class="results" id="results-view">
    <div class="stars" id="stars"></div>
    <div class="score-big" id="score-big"></div>
    <div class="score-label">out of 5 correct</div>
    <div class="result-msg" id="result-msg"></div>
    <div class="result-sub" id="result-sub"></div>
    <button class="restart-btn" onclick="startQuiz()">Try Again</button>
  </div>

</div>

<script>
const ALL_FLAGS = [
  { flag:'🇧🇷', name:'Brazil' },
  { flag:'🇯🇵', name:'Japan' },
  { flag:'🇩🇪', name:'Germany' },
  { flag:'🇫🇷', name:'France' },
  { flag:'🇮🇹', name:'Italy' },
  { flag:'🇨🇦', name:'Canada' },
  { flag:'🇦🇺', name:'Australia' },
  { flag:'🇲🇽', name:'Mexico' },
  { flag:'🇮🇳', name:'India' },
  { flag:'🇨🇳', name:'China' },
  { flag:'🇰🇷', name:'South Korea' },
  { flag:'🇿🇦', name:'South Africa' },
  { flag:'🇦🇷', name:'Argentina' },
  { flag:'🇳🇬', name:'Nigeria' },
  { flag:'🇸🇪', name:'Sweden' },
  { flag:'🇳🇴', name:'Norway' },
  { flag:'🇵🇹', name:'Portugal' },
  { flag:'🇬🇷', name:'Greece' },
  { flag:'🇹🇷', name:'Turkey' },
  { flag:'🇨🇴', name:'Colombia' },
  { flag:'🇪🇬', name:'Egypt' },
  { flag:'🇹🇭', name:'Thailand' },
  { flag:'🇮🇩', name:'Indonesia' },
  { flag:'🇵🇱', name:'Poland' },
  { flag:'🇳🇱', name:'Netherlands' },
  { flag:'🇧🇪', name:'Belgium' },
  { flag:'🇨🇭', name:'Switzerland' },
  { flag:'🇦🇹', name:'Austria' },
  { flag:'🇵🇭', name:'Philippines' },
  { flag:'🇺🇦', name:'Ukraine' },
  { flag:'🇸🇦', name:'Saudi Arabia' },
  { flag:'🇵🇪', name:'Peru' },
  { flag:'🇻🇳', name:'Vietnam' },
  { flag:'🇰🇪', name:'Kenya' },
  { flag:'🇩🇰', name:'Denmark' },
  { flag:'🇫🇮', name:'Finland' },
];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

let questions = [], current = 0, score = 0, answered = false;

function pickQuestions() {
  const pool = shuffle(ALL_FLAGS).slice(0, 15);
  questions = [];
  const chosen = pool.slice(0, 5);
  const rest = pool.slice(5);

  chosen.forEach(correct => {
    const wrongs = shuffle(rest.filter(f => f.name !== correct.name)).slice(0, 2);
    const opts = shuffle([correct, ...wrongs]);
    questions.push({ correct, opts });
    rest.push(...wrongs); // put back to allow reuse
  });
}

function renderPips() {
  const wrap = document.getElementById('pips');
  wrap.innerHTML = '';
  for (let i=0;i<5;i++) {
    const d = document.createElement('div');
    d.className = 'pip' + (i < current ? ' done' : i === current ? ' active' : '');
    wrap.appendChild(d);
  }
}

function showQuestion() {
  answered = false;
  const q = questions[current];
  document.getElementById('q-num').textContent = current + 1;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').style.display = 'none';

  const flagEl = document.getElementById('flag');
  flagEl.textContent = q.correct.flag;
  flagEl.classList.remove('pop');
  void flagEl.offsetWidth;
  flagEl.classList.add('pop');

  renderPips();

  const optsEl = document.getElementById('options');
  optsEl.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('div');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-key">${['A','B','C'][i]}</span><span class="opt-text">${opt.name}</span>`;
    btn.addEventListener('click', () => pick(btn, opt, q.correct));
    optsEl.appendChild(btn);
  });
}

function pick(btn, chosen, correct) {
  if (answered) return;
  answered = true;

  const allOpts = document.querySelectorAll('.opt');
  allOpts.forEach(o => o.classList.add('disabled'));

  const fb = document.getElementById('feedback');

  if (chosen.name === correct.name) {
    btn.classList.add('correct');
    score++;
    fb.textContent = '✓ Correct!';
    fb.className = 'feedback show-correct';
  } else {
    btn.classList.add('wrong');
    fb.textContent = `✗ It's ${correct.name}`;
    fb.className = 'feedback show-wrong';
    // Highlight correct
    allOpts.forEach(o => {
      if (o.querySelector('.opt-text').textContent === correct.name) o.classList.add('correct');
    });
  }

  const nextBtn = document.getElementById('next-btn');
  nextBtn.style.display = 'block';
  nextBtn.textContent = current < 4 ? 'Next →' : 'See Results →';
}

document.getElementById('next-btn').addEventListener('click', () => {
  current++;
  if (current < 5) {
    showQuestion();
  } else {
    showResults();
  }
});

function showResults() {
  document.getElementById('quiz-view').style.display = 'none';
  const rv = document.getElementById('results-view');
  rv.style.display = 'block';

  document.getElementById('score-big').textContent = score;

  const msgs = [
    { stars:'⭐', msg:'Keep exploring!', sub:'Geography is tough.\nEvery quiz makes you sharper.' },
    { stars:'⭐⭐', msg:'Not bad!', sub:'You know your way around the globe.\nKeep it up!' },
    { stars:'⭐⭐⭐', msg:'Pretty good!', sub:'Solid geography knowledge.\nCan you get a perfect score?' },
    { stars:'⭐⭐⭐⭐', msg:'Great job!', sub:'You really know your flags.\nSo close to perfect!' },
    { stars:'🏆', msg:'Perfect score!', sub:'Flag expert! You aced all 5.\nImpressive!' },
  ];

  const m = score === 5 ? msgs[4] : score === 4 ? msgs[3] : score === 3 ? msgs[2] : score === 1 ? msgs[0] : msgs[1];
  document.getElementById('stars').textContent = m.stars;
  document.getElementById('result-msg').textContent = m.msg;
  document.getElementById('result-sub').textContent = m.sub.replace('\\n', '\n');
}

function startQuiz() {
  score = 0;
  current = 0;
  pickQuestions();
  document.getElementById('quiz-view').style.display = 'block';
  document.getElementById('results-view').style.display = 'none';
  showQuestion();
}

startQuiz();
</script>
</body>
</html>
